<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies Practice - PSSA</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Social Studies Practice</h1>
            <h2>Explore History, Geography, and Society</h2>
            <p class="subtitle">Learn about the world around you</p>
        </div>

        <div class="subject-buttons" id="levelButtons">
            <p>Loading levels...</p>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="../dashboard.html" class="btn" style="background: linear-gradient(135deg, #27ae60 0%, #229954 100%);">Back to Dashboard</a>
        </div>
    </div>

    <script src="../js/userManager.js"></script>
    <script>
        function loadLevels() {
            const user = userManager.getCurrentUser();
            const container = document.getElementById('levelButtons');
            
            if (!user) {
                container.innerHTML = '<p>Please <a href="../login.html">log in</a> to access levels.</p>';
                return;
            }

            const grade = user.gradeLevel;
            const progress = userManager.getUserProgress(user.id);
            
            let html = '';
            for (let level = 1; level <= 10; level++) {
                const isUnlocked = userManager.isLevelUnlocked(user.id, grade, 'social', level);
                const isCompleted = progress?.grades?.[grade]?.social?.levels?.[level - 1]?.completed;
                
                if (isCompleted) {
                    html += `<a href="quiz.html?grade=${grade}&level=${level}" class="btn" style="background-color: #3498db;">✓ Level ${level}</a>`;
                } else if (isUnlocked) {
                    html += `<a href="quiz.html?grade=${grade}&level=${level}" class="btn">Level ${level}</a>`;
                } else {
                    html += `<a href="#" class="btn" style="background-color: #bdc3c7; cursor: not-allowed;" onclick="alert('Complete previous levels first!'); return false;">🔒 Level ${level}</a>`;
                }
            }
            
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadLevels);
    </script>
