<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - PSSA Practice</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/timer.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --success: #10b981;
            --danger: #ef4444;
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 750px;
            margin: 30px auto;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .quiz-title {
            margin: 0;
            font-size: 1.6em;
            font-weight: 800;
            color: var(--text-main);
        }

        .progress-info {
            text-align: right;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9em;
        }

        .timer-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .timer {
            font-size: 1.4em;
            font-weight: 800;
            color: var(--danger);
            background-color: #fee2e2;
            padding: 8px 24px;
            border-radius: 999px;
            display: inline-block;
            min-width: 60px;
            border: 2px solid var(--danger);
        }

        .question-container {
            margin: 25px 0;
        }

        .question-number {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #question {
            font-size: 1.4em;
            margin: 12px 0 25px 0;
            color: var(--text-main);
            font-weight: 700;
            line-height: 1.4;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin: 25px 0;
        }

        .answer-btn {
            background-color: white;
            border: 2px solid var(--border-color);
            color: var(--primary);
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .answer-btn:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .answer-btn.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .answer-btn.correct {
            background-color: #d1fae5;
            color: #065f46;
            border-color: var(--success);
            font-weight: 700;
        }

        .answer-btn.wrong {
            background-color: #fee2e2;
            color: #991b1b;
            border-color: var(--danger);
            font-weight: 700;
        }

        #controls, #results-controls {
            display: flex;
            gap: 12px;
            margin-top: 35px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-action {
            background: var(--primary-gradient);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .btn-action:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.25);
        }

        .btn-action:disabled {
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
        }

        #results {
            text-align: center;
            padding: 35px;
            background-color: #f8fafc;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }

        .result-emoji {
            font-size: 4.5em;
            margin-bottom: 10px;
        }

        .result-message {
            font-size: 1.6em;
            color: var(--text-main);
            margin: 10px 0;
            font-weight: 800;
        }

        .result-score {
            font-size: 3em;
            color: var(--primary);
            margin: 15px 0;
            font-weight: 800;
        }

        .result-details {
            color: var(--text-muted);
            font-weight: 600;
            margin: 10px 0;
        }

        .certificate {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 24px;
            border-radius: 12px;
            margin: 25px 0;
            border: 2px dashed #ca8a04;
            color: #854d0e;
        }

        .certificate h3 {
            margin-top: 0;
            font-weight: 800;
        }

        .hide {
            display: none !important;
        }

        @media (max-width: 480px) {
            .quiz-header {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
            .progress-info {
                text-align: center;
            }
            .btn-grid {
                grid-template-columns: 1fr;
            }
            #controls, #results-controls {
                flex-direction: column;
            }
            .btn-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="quiz-header">
        <h1 class="quiz-title" id="quizTitle">Quiz</h1>
        <div class="progress-info">
            <div id="progressText">Question 1 of 5</div>
            <div style="margin-top: 5px;">Grade: <span id="gradeDisplay"></span> | Level: <span id="levelDisplay"></span></div>
        </div>
    </div>

    <div class="timer-container">
        <div class="timer" id="timer">60</div>
    </div>

    <div id="quiz-container">
        <div id="question-container" class="question-container">
            <div class="question-number" id="questionNumber">Question 1</div>
            <h2 id="question">Loading question...</h2>
            <div id="answer-buttons" class="btn-grid">
            </div>
        </div>
        <div id="controls">
            <button class="btn-action" id="next-btn" disabled>Next Question</button>
            <button class="btn-action" style="background-color: #95a5a6; box-shadow: none;" onclick="goBack()">Back to Dashboard</button>
        </div>
    </div>

    <div id="results" class="hide">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 class="result-message" id="resultMessage">Great Job!</h2>
        <div class="result-score" id="resultScore">80%</div>
        <div class="result-details" id="resultDetails">You scored 4 out of 5</div>

        <div id="certificateDiv" class="certificate hide">
            <h3>🏆 LEVEL COMPLETED!</h3>
            <p id="certificateText">Congratulations! You've unlocked the next level.</p>
        </div>

        <div id="retryDiv" class="hide">
            <p style="color: var(--danger); font-weight: bold; margin: 15px 0;">You need 70% to unlock the next level. Keep practicing!</p>
        </div>

        <div id="results-controls" style="gap: 10px;">
            <button class="btn-action" id="restart-btn" onclick="retakeQuiz()">Retake Level</button>
            <button class="btn-action" style="background-color: var(--success); box-shadow: none;" onclick="goBack()">Back to Dashboard</button>
            <button class="btn-action" id="nextLevelBtn" style="background-color: var(--success); display: none;" onclick="goToNextLevel()">Next Level →</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/userManager.js"></script>
<script src="../js/questions-k.js"></script>
<script src="../js/questions-grade1.js"></script>
<script src="../js/questions-grade2.js"></script>
<script src="../js/questions-grade3.js"></script>
<script src="../js/questions-grade4.js"></script>
<script src="../js/questions-grade5.js"></script>
<script src="../js/questionBank.js"></script>
<script src="../js/timerManager.js"></script>
<script>
    // Quiz state
    let quizState = {
        grade: null,
        subject: null,
        level: null,
        currentQuestionIndex: 0,
        score: 0,
        answers: [],
        questions: [],
        answered: false,
        currentUser: null,
        startTime: null,
        endTime: null,
        timer: null,
        timeLeft: 60
    };

    // Initialize quiz
    function initQuiz() {
        quizState.currentUser = userManager.getCurrentUser();
        if (!quizState.currentUser) {
            window.location.href = '../login.html';
            return;
        }
        const urlParams = new URLSearchParams(window.location.search);
        quizState.grade = urlParams.get('grade') || quizState.currentUser.gradeLevel;
        quizState.level = parseInt(urlParams.get('level')) || 1;

        const pathParts = window.location.pathname.split('/');
        quizState.subject = pathParts[pathParts.length - 2];

        if (!quizState.grade || !quizState.subject || !quizState.level) {
            alert('Invalid quiz parameters');
            window.location.href = '../dashboard.html';
            return;
        }

        if (!userManager.isLevelUnlocked(quizState.currentUser.id, quizState.grade, quizState.subject, quizState.level)) {
            alert('This level is locked. Complete the previous level first!');
            window.location.href = '../dashboard.html';
            return;
        }

        quizState.questions = getQuestionsForLevel(quizState.grade, quizState.subject, quizState.level);

        const subjectNames = { math: 'Math', english: 'English', social: 'Social Studies', science: 'Science' };
        const gradeNames = { K: 'Kindergarten', 1: '1st', 2: '2nd', 3: '3rd', 4: '4th', 5: '5th' };

        document.getElementById('quizTitle').textContent = `${subjectNames[quizState.subject] || 'Quiz'} - Level ${quizState.level}`;
        document.getElementById('gradeDisplay').textContent = gradeNames[quizState.grade] || quizState.grade;
        document.getElementById('levelDisplay').textContent = quizState.level;

        quizState.startTime = Date.now();
        showQuestion();
    }

    // Show current question
    function showQuestion() {
        if (quizState.currentQuestionIndex >= quizState.questions.length) {
            showResults();
            return;
        }

        const question = quizState.questions[quizState.currentQuestionIndex];
        const questionNum = quizState.currentQuestionIndex + 1;

        document.getElementById('questionNumber').textContent = `Question ${questionNum}`;
        document.getElementById('question').textContent = question.question;
        document.getElementById('progressText').textContent = `Question ${questionNum} of ${quizState.questions.length}`;

        const buttonContainer = document.getElementById('answer-buttons');
        buttonContainer.innerHTML = '';

        question.answers.forEach((answer, index) => {
            const button = document.createElement('button');
            button.className = 'answer-btn';
            button.textContent = answer.text;
            button.onclick = () => selectAnswer(index, answer.correct);
            button.id = `answer-${index}`;
            buttonContainer.appendChild(button);
        });

        document.getElementById('next-btn').disabled = true;
        quizState.answered = false;
        startTimer();
    }

    // Start timer for current question
    function startTimer() {
        timerManager.init(timeUp);
        timerManager.start(60);
    }

    // Clear timer
    function clearTimer() {
        timerManager.stop();
    }

    // Handle when time runs out
    function timeUp() {
        if (quizState.answered) return;

        quizState.answered = true;

        const buttons = document.querySelectorAll('.answer-btn');
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            const question = quizState.questions[quizState.currentQuestionIndex];
            if (question.answers[i].correct) {
                btn.classList.add('correct');
            }
        });

        quizState.answers.push({
            questionIndex: quizState.currentQuestionIndex,
            selected: -1,
            correct: false,
            timeUp: true
        });

        setTimeout(() => {
            document.getElementById('next-btn').disabled = false;
        }, 2000);
    }

    // Select answer
    function selectAnswer(index, isCorrect) {
        if (quizState.answered) return;
        clearTimer();

        quizState.answered = true;

        const buttons = document.querySelectorAll('.answer-btn');
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            const question = quizState.questions[quizState.currentQuestionIndex];
            if (question.answers[i].correct) {
                btn.classList.add('correct');
            } else if (i === index && !isCorrect) {
                btn.classList.add('wrong');
            }
        });

        if (isCorrect) {
            quizState.score++;
        }

        quizState.answers.push({
            questionIndex: quizState.currentQuestionIndex,
            selected: index,
            correct: isCorrect
        });

        document.getElementById('next-btn').disabled = false;
    }

    // Next question
    function nextQuestion() {
        quizState.currentQuestionIndex++;
        if (quizState.currentQuestionIndex < quizState.questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    // Show results
    function showResults() {
        quizState.endTime = Date.now();
        const percentage = Math.round((quizState.score / quizState.questions.length) * 100);
        const passed = percentage >= 70;

        document.getElementById('quiz-container').classList.add('hide');
        document.getElementById('results').classList.remove('hide');

        if (passed) {
            document.getElementById('resultEmoji').textContent = '🎉';
            document.getElementById('resultMessage').textContent = 'Excellent Work!';
        } else {
            document.getElementById('resultEmoji').textContent = '📚';
            document.getElementById('resultMessage').textContent = 'Good Try! Keep Practicing!';
        }

        document.getElementById('resultScore').textContent = percentage + '%';
        document.getElementById('resultDetails').textContent = `You scored ${quizState.score} out of ${quizState.questions.length}`;

        userManager.completeLevelWithScore(
            quizState.currentUser.id,
            quizState.grade,
            quizState.subject,
            quizState.level,
            quizState.score,
            quizState.questions.length
        );

        if (passed) {
            document.getElementById('certificateDiv').classList.remove('hide');
            document.getElementById('nextLevelBtn').style.display = quizState.level < CONFIG.LEVELS_PER_SUBJECT ? 'inline-block' : 'none';
        } else {
            document.getElementById('retryDiv').classList.remove('hide');
        }
        clearTimer();
    }

    // Retake quiz
    function retakeQuiz() {
        clearTimer();
        quizState.currentQuestionIndex = 0;
        quizState.score = 0;
        quizState.answers = [];
        quizState.answered = false;
        document.getElementById('results').classList.add('hide');
        document.getElementById('quiz-container').classList.remove('hide');
        showQuestion();
    }

    // Go to next level
    function goToNextLevel() {
        if (quizState.level < CONFIG.LEVELS_PER_SUBJECT) {
            window.location.href = `${window.location.pathname}?grade=${quizState.grade}&level=${quizState.level + 1}`;
        }
    }

    // Go back to dashboard
    function goBack() {
        window.location.href = '../dashboard.html';
    }

    window.addEventListener('beforeunload', function(e) {
        if (!document.getElementById('results').classList.contains('hide')) return;
        if (quizState.currentQuestionIndex > 0 && !document.getElementById('quiz-container').classList.contains('hide')) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    document.addEventListener('DOMContentLoaded', initQuiz);
    document.getElementById('next-btn').addEventListener('click', nextQuestion);
</script>
</body>
</html>
