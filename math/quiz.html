<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - PSSA Practice</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #27ae60;
        }

        .quiz-title {
            margin: 0;
        }

        .progress-info {
            text-align: right;
            color: #7f8c8d;
        }

        .timer-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 1.5em;
            font-weight: bold;
            color: #e74c3c;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid #e74c3c;
            display: inline-block;
            min-width: 80px;
        }

        .timer.warning {
            color: #f39c12;
            border-color: #f39c12;
            animation: pulse 1s infinite;
        }

        .timer.danger {
            color: #e74c3c;
            border-color: #e74c3c;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .question-container {
            margin: 20px 0;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }

        #question {
            font-size: 1.3em;
            margin: 15px 0;
            color: #2c3e50;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .answer-btn {
            background-color: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .answer-btn:hover:not(:disabled) {
            background-color: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .answer-btn.selected {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .answer-btn.correct {
            background-color: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .answer-btn.wrong {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        #controls {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        #controls-new {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }

        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #results {
            text-align: center;
            padding: 30px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-emoji {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .result-message {
            font-size: 1.5em;
            color: #2c3e50;
            margin: 15px 0;
            font-weight: bold;
        }

        .result-score {
            font-size: 2.5em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .result-details {
            color: #7f8c8d;
            margin: 15px 0;
        }

        .certificate {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 3px solid #f39c12;
        }

        .hide {
            display: none;
        }

        .back-btn {
            display: inline-block;
            background-color: #95a5a6;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #7f8c8d;
        }

        @media (max-width: 480px) {
            .quiz-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .progress-info {
                text-align: center;
            }

            .btn-grid {
                grid-template-columns: 1fr;
            }

            #controls {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1 class="quiz-title" id="quizTitle">Quiz</h1>
            <div class="progress-info">
                <div id="progressText">Question 1 of 5</div>
                <div style="margin-top: 5px;">Grade: <span id="gradeDisplay"></span> | Level: <span id="levelDisplay"></span></div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer" id="timer">60</div>
        </div>

        <div id="quiz-container">
            <div id="question-container" class="question-container">
                <div class="question-number" id="questionNumber">Question 1</div>
                <h2 id="question">Loading question.......</h2>
                <div id="answer-buttons" class="btn-grid">
                    <!-- Answer buttons will be inserted here -->
                </div>
            </div>
            <div id="controls-new">
                <button class="btn-action" id="next-btn" disabled>Next Question</button>
                <button class="btn-action" style="background-color: #95a5a6;" onclick="goBack()">Back to Dashboard</button>
            </div>
        </div>

        <div id="results" class="hide">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <h2 class="result-message" id="resultMessage">Great Job!</h2>
            <div class="result-score" id="resultScore">80%</div>
            <div class="result-details" id="resultDetails">You scored 4 out of 5</div>

            <div id="certificateDiv" class="certificate hide">
                <h3>🏆 LEVEL COMPLETED!</h3>
                <p id="certificateText">Congratulations! You've unlocked the next level.</p>
            </div>

            <div id="retryDiv" class="hide">
                <p style="color: #e74c3c; font-weight: bold; margin: 15px 0;">You need 70% to unlock the next level. Keep practicing!</p>
            </div>

            <div id="controls" style="gap: 10px;">
                <button class="btn-action" id="restart-btn" onclick="retakeQuiz()">Retake Level</button>
                <button class="btn-action" style="background-color: #27ae60;" onclick="goBack()">Back to Dashboard</button>
                <button class="btn-action" id="nextLevelBtn" style="background-color: #27ae60; display: none;" onclick="goToNextLevel()">Next Level →</button>
            </div>
        </div>
    </div>

    <script src="../js/userManager.js"></script>
    <script src="../js/questions-k.js"></script>
    <script src="../js/questions-grade1.js"></script>
    <script src="../js/questions-grade2.js"></script>
    <script src="../js/questions-grade3.js"></script>
    <script src="../js/questions-grade4.js"></script>
    <script src="../js/questions-grade5.js"></script>
    <script src="../js/questionBank.js"></script>
    <script>
        // Quiz state
        let quizState = {
            grade: null,
            subject: null,
            level: null,
            currentQuestionIndex: 0,
            score: 0,
            answers: [],
            questions: [],
            answered: false,
            currentUser: null,
            startTime: null,
            endTime: null,
            timer: null,
            timeLeft: 60
        };

        // Initialize quiz
        function initQuiz() {
            // Check login
            quizState.currentUser = userManager.getCurrentUser();
            if (!quizState.currentUser) {
                window.location.href = '../login.html';
                return;
            }

            // Get parameters from URL
            const urlParams = new URLSearchParams(window.location.search);
            quizState.grade = (urlParams.get('grade') || quizState.currentUser.gradeLevel).toUpperCase();
            quizState.level = parseInt(urlParams.get('level')) || 1;

            // Get subject from current URL
            const pathParts = window.location.pathname.split('/');
            quizState.subject = pathParts[pathParts.length - 2]; // Get folder name

            // Validate parameters
            if (!quizState.grade || !quizState.subject || !quizState.level) {
                alert('Invalid quiz parameters');
                window.location.href = '../dashboard.html';
                return;
            }

            // Check if level is unlocked
            if (!userManager.isLevelUnlocked(quizState.currentUser.id, quizState.grade, quizState.subject, quizState.level)) {
                alert('This level is locked. Complete the previous level first!');
                window.location.href = '../dashboard.html';
                return;
            }

            // Load questions
            quizState.questions = getQuestionsForLevel(quizState.grade, quizState.subject, quizState.level);

            // Display quiz info
            const subjectNames = { math: 'Math', english: 'English', social: 'Social Studies', science: 'Science' };
            const gradeNames = { K: 'Kindergarten', 1: '1st', 2: '2nd', 3: '3rd', 4: '4th', 5: '5th' };

            document.getElementById('quizTitle').textContent = `${subjectNames[quizState.subject] || 'Quiz'} - Level ${quizState.level}`;
            document.getElementById('gradeDisplay').textContent = gradeNames[quizState.grade] || quizState.grade;
            document.getElementById('levelDisplay').textContent = quizState.level;

            quizState.startTime = Date.now();
            showQuestion();
        }

        // Show current question
        function showQuestion() {
            if (quizState.currentQuestionIndex >= quizState.questions.length) {
                showResults();
                return;
            }

            const question = quizState.questions[quizState.currentQuestionIndex];
            const questionNum = quizState.currentQuestionIndex + 1;

            document.getElementById('questionNumber').textContent = `Question ${questionNum}`;
            document.getElementById('question').textContent = question.question;
            document.getElementById('progressText').textContent = `Question ${questionNum} of ${quizState.questions.length}`;

            const buttonContainer = document.getElementById('answer-buttons');
            buttonContainer.innerHTML = '';

            question.answers.forEach((answer, index) => {
                const button = document.createElement('button');
                button.className = 'answer-btn';
                button.textContent = answer.text;
                button.onclick = () => selectAnswer(index, answer.correct);
                button.id = `answer-${index}`;
                buttonContainer.appendChild(button);
            });

            document.getElementById('next-btn').disabled = true;
            quizState.answered = false;

            // Start timer for current question
            startTimer();
        }

        // Start timer for current question
        function startTimer() {
            quizState.timeLeft = 60;
            updateTimerDisplay();

            quizState.timer = setInterval(() => {
                quizState.timeLeft--;
                updateTimerDisplay();

                if (quizState.timeLeft <= 0) {
                    clearInterval(quizState.timer);
                    timeUp();
                }
            }, 1000);
        }

        // Update timer display with visual feedback
        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = quizState.timeLeft;

            // Remove existing classes
            timerElement.classList.remove('warning', 'danger');

            // Add warning class when time is low
            if (quizState.timeLeft <= 10) {
                timerElement.classList.add('danger');
            } else if (quizState.timeLeft <= 20) {
                timerElement.classList.add('warning');
            }
        }

        // Handle when time runs out
        function timeUp() {
            if (quizState.answered) return; // Already answered

            // Mark as answered (incorrect since time ran out)
            quizState.answered = true;

            // Show correct answer
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                const question = quizState.questions[quizState.currentQuestionIndex];
                if (question.answers[i].correct) {
                    btn.classList.add('correct');
                }
            });

            // Add incorrect answer to results
            quizState.answers.push({
                questionIndex: quizState.currentQuestionIndex,
                selected: -1, // -1 indicates time ran out
                correct: false,
                timeUp: true
            });

            // Enable next button after a short delay
            setTimeout(() => {
                document.getElementById('next-btn').disabled = false;
            }, 2000);
        }

        // Clear timer
        function clearTimer() {
            if (quizState.timer) {
                clearInterval(quizState.timer);
                quizState.timer = null;
            }
        }

        // Select answer
        function selectAnswer(index, isCorrect) {
            if (quizState.answered) return;

            // Clear timer when answer is selected
            clearTimer();

            quizState.answered = true;

            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                const question = quizState.questions[quizState.currentQuestionIndex];
                if (question.answers[i].correct) {
                    btn.classList.add('correct');
                } else if (i === index && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });

            if (isCorrect) {
                quizState.score++;
            }

            quizState.answers.push({
                questionIndex: quizState.currentQuestionIndex,
                selected: index,
                correct: isCorrect
            });

            document.getElementById('next-btn').disabled = false;
        }

        // Next question
        function nextQuestion() {
            quizState.currentQuestionIndex++;
            if (quizState.currentQuestionIndex < quizState.questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        // Show results
        function showResults() {
            quizState.endTime = Date.now();
            const percentage = Math.round((quizState.score / quizState.questions.length) * 100);
            const passed = percentage >= 70;

            document.getElementById('quiz-container').classList.add('hide');
            document.getElementById('results').classList.remove('hide');

            if (passed) {
                document.getElementById('resultEmoji').textContent = '🎉';
                document.getElementById('resultMessage').textContent = 'Excellent Work!';
            } else {
                document.getElementById('resultEmoji').textContent = '📚';
                document.getElementById('resultMessage').textContent = 'Good Try! Keep Practicing!';
            }

            document.getElementById('resultScore').textContent = percentage + '%';
            document.getElementById('resultDetails').textContent = `You scored ${quizState.score} out of ${quizState.questions.length}`;

            // Save progress
            const result = userManager.completeLevelWithScore(
                quizState.currentUser.id,
                quizState.grade,
                quizState.subject,
                quizState.level,
                quizState.score,
                quizState.questions.length
            );
            if (passed) {
                document.getElementById('certificateDiv').classList.remove('hide');
                document.getElementById('nextLevelBtn').style.display = quizState.level < 10 ? 'inline-block' : 'none';
            } else {
                document.getElementById('retryDiv').classList.remove('hide');
            }
            // Clear timer when quiz is finished
            clearTimer();
        }

        // Retake quiz
        function retakeQuiz() {
            // Clear any existing timer
            clearTimer();

            quizState.currentQuestionIndex = 0;
            quizState.score = 0;
            quizState.answers = [];
            quizState.answered = false;
            document.getElementById('results').classList.add('hide');
            document.getElementById('quiz-container').classList.remove('hide');
            showQuestion();
        }

        // Go to next level
        function goToNextLevel() {
            if (quizState.level < 10) {
                window.location.href = `${window.location.pathname}?grade=${quizState.grade}&level=${quizState.level + 1}`;
            }
        }

        // Go back to dashboard
        function goBack() {
            window.location.href = '../dashboard.html';
        }

        // Prevent cheating - disable back button during quiz
        window.addEventListener('beforeunload', function(e) {
            if (!document.getElementById('results').classList.contains('hide')) return;
            if (quizState.currentQuestionIndex > 0 && !document.getElementById('quiz-container').classList.contains('hide')) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initQuiz);

        // Next button click handler
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
    </script>
</body>
</html>
