<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindergarten - PSSA Practice</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --success: #10b981;
            --success-gradient: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .header h2 {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--primary);
            margin: 0 0 8px 0;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1em;
            font-weight: 500;
        }

        .subject-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin: 35px 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05em;
            text-decoration: none;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 12px 20px -5px rgba(79, 70, 229, 0.15);
        }

        .btn-nav {
            display: inline-block;
            background: var(--success-gradient);
            color: white;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1em;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-nav:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 15px auto;
            }
            .header h1 {
                font-size: 1.8em;
            }
            .subject-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .btn {
                padding: 16px 10px;
                font-size: 0.95em;
            }
            .btn-nav {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌟 Kindergarten Practice</h1>
        <h2>Welcome to Your Learning Adventure!</h2>
        <p class="subtitle">Choose a subject to start practicing</p>
    </div>

    <div class="subject-buttons">
        <a href="../math/quiz.html?grade=K&level=1" class="btn">📐 Math</a>
        <a href="../english/quiz.html?grade=K&level=1" class="btn">📚 English</a>
        <a href="../social/quiz.html?grade=K&level=1" class="btn">🌍 Social Studies</a>
        <a href="../science/quiz.html?grade=K&level=1" class="btn">🔬 Science</a>
    </div>

    <div style="text-align: center; margin-top: 35px;">
        <a href="../dashboard.html" class="btn-nav">Go to Main Dashboard</a>
    </div>
</div>
</body>
</html>
