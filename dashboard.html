<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PSSA Practice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info {
            text-align: left;
        }

        .user-name {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-grade {
            color: var(--text-muted);
            font-size: 0.95em;
            margin: 6px 0 0 0;
            font-weight: 500;
        }

        .logout-btn {
            background-color: #fff;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .logout-btn:hover {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }

        .subject-card h3 {
            margin: 0 0 12px 0;
            font-size: 1.35em;
            color: var(--text-main);
            font-weight: 700;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #f1f5f9;
            border-radius: 999px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 999px;
            transition: width 0.5s ease-out;
        }

        .progress-text {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 600;
        }

        .levels-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .level-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.2s ease;
            background-color: #fff;
            color: var(--text-main);
        }

        .level-btn:hover:not(:disabled) {
            transform: scale(1.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .level-btn.unlocked {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }

        .level-btn.completed {
            background-color: #eef2ff;
            border-color: #c7d2fe;
            color: var(--primary);
        }

        .level-btn.locked {
            background-color: #f8fafc;
            border-color: var(--border-color);
            color: #cbd5e1;
            cursor: not-allowed;
        }

        .level-btn:disabled {
            cursor: not-allowed;
        }

        .stats-section {
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            margin-top: 40px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .stats-section h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }
            .user-info {
                text-align: center;
            }
            .subject-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <div class="user-info">
            <p class="user-name">👤 <span id="userName"></span></p>
            <p class="user-grade">Grade: <span id="userGrade"></span></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="subjectGrid" class="subject-grid"></div>

    <div class="stats-section">
        <h2>📊 Your Progress</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="completedLevels">0</div>
                <div class="stat-label">Levels Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="averageScore">0%</div>
                <div class="stat-label">Average Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAttempts">0</div>
                <div class="stat-label">Total Attempts</div>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/userManager.js"></script>
<script>
    // Check if user is logged in
    function checkLogin() {
        const currentUser = userManager.getCurrentUser();
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        return currentUser;
    }

    // Load dashboard
    function loadDashboard() {
        const currentUser = checkLogin();
        if (!currentUser) return;

        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userGrade').textContent = currentUser.gradeLevel;

        loadSubjects(currentUser);
        updateStats(currentUser);
    }

    // Load subjects and levels
    function loadSubjects(currentUser) {
        const subjects = [
            { name: 'Math', emoji: '📐', icon: '🔢' },
            { name: 'English', emoji: '📚', icon: '✍️' },
            { name: 'Social Studies', emoji: '🌍', icon: '📍' },
            { name: 'Science', emoji: '🔬', icon: '⚗️' }
        ];

        const progress = userManager.getUserProgress(currentUser.id);
        const grid = document.getElementById('subjectGrid');
        grid.innerHTML = '';

        const subjectKeyMap = {
            'Math': 'math',
            'English': 'english',
            'Social Studies': 'social',
            'Science': 'science'
        };

        subjects.forEach(subject => {
            const subjectKey = subjectKeyMap[subject.name];
            const subjectProgress = progress.grades[currentUser.gradeLevel]?.[subjectKey];

            if (!subjectProgress) return;

            const completedLevels = subjectProgress.levels.filter(l => l.completed).length;
            const progressPercent = (completedLevels / 10) * 100;

            let html = `
                    <div class="subject-card" onclick="selectSubject('${subjectKey}', '${subject.name}')">
                        <h3>${subject.emoji} ${subject.name}</h3>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="progress-text">${completedLevels}/10 levels completed</div>
                        <div class="levels-container">
                `;

            subjectProgress.levels.forEach(level => {
                const btnClass = level.locked ? 'locked' : (level.completed ? 'completed' : 'unlocked');
                const btnText = level.locked ? '🔒' : (level.completed ? '✓' : level.levelNum);
                // FIXED: event.stopPropagation() added to prevent dynamic bubbling triggers
                const onclick = level.locked ? '' : `onclick="event.stopPropagation(); startQuiz('${subjectKey}', '${currentUser.gradeLevel}', ${level.levelNum})"`;

                html += `
                        <button class="level-btn ${btnClass}" ${onclick} ${level.locked ? 'disabled' : ''} title="Level ${level.levelNum}">
                            ${btnText}
                        </button>
                    `;
            });

            html += `
                        </div>
                    </div>
                `;

            grid.innerHTML += html;
        });
    }

    // Select subject (optional - for now goes directly to level)
    function selectSubject(subject, subjectName) {
        console.log('Subject selected:', subject);
    }

    // Start quiz
    function startQuiz(subject, grade, level) {
        const url = `${subject}/quiz.html?grade=${grade}&level=${level}`;
        window.location.href = url;
    }

    // Update statistics
    function updateStats(currentUser) {
        const progress = userManager.getUserProgress(currentUser.id);
        const subjects = ['math', 'english', 'social', 'science'];

        let totalCompleted = 0;
        let totalScore = 0;
        let scoreCount = 0;
        let totalAttempts = 0;

        subjects.forEach(subject => {
            const levels = progress.grades[currentUser.gradeLevel]?.[subject]?.levels || [];
            levels.forEach(level => {
                if (level.completed) {
                    totalCompleted++;
                    totalScore += level.score;
                    scoreCount++;
                }
                totalAttempts += level.attempts || 0;
            });
        });

        document.getElementById('completedLevels').textContent = totalCompleted;
        document.getElementById('averageScore').textContent = scoreCount > 0 ? Math.round(totalScore / scoreCount) + '%' : '0%';
        document.getElementById('totalAttempts').textContent = totalAttempts;
    }

    // Logout
    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            sessionStorage.removeItem('pssaCurrentUser');
            window.location.href = 'login.html';
        }
    }
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
