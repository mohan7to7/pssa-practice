<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning Hub - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-gradient: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            --math-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --english-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --social-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --science-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #eab308;
            --background: #f0f7ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Ubuntu Condensed', sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 24px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border: 3px solid #e2e8f0;
        }

        .user-info {
            text-align: left;
        }

        .user-name {
            font-size: 1.8em;
            font-weight: 700;
            color: #4f46e5;
            margin: 0;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        .user-grade {
            background: #dbeafe;
            color: #1e40af;
            font-size: 1em;
            padding: 6px 16px;
            border-radius: 999px;
            margin: 8px 0 0 0;
            display: inline-block;
            font-weight: bold;
            border: 2px solid #bfdbfe;
        }

        .logout-btn {
            background-color: #fff;
            color: var(--danger);
            border: 3px solid #fee2e2;
            padding: 10px 24px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logout-btn:hover {
            background-color: var(--danger);
            color: white;
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .subject-card {
            background: var(--card-bg);
            border: 4px solid transparent;
            padding: 24px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .subject-card.math-card { border-color: #93c5fd; }
        .subject-card.english-card { border-color: #fbcfe8; }
        .subject-card.social-card { border-color: #a7f3d0; }
        .subject-card.science-card { border-color: #fde68a; }

        .subject-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 32px rgba(0,0,0,0.08);
        }

        .subject-card h3 {
            margin: 0 0 12px 0;
            font-size: 1.6em;
            color: var(--text-main);
        }

        .progress-container-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 10px;
            border: 2px dashed #cbd5e1;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .math-fill { background: var(--math-gradient); }
        .english-fill { background: var(--english-gradient); }
        .social-fill { background: var(--social-gradient); }
        .science-fill { background: var(--science-gradient); }

        .progress-text {
            font-size: 0.95em;
            color: #475569;
            margin-top: 8px;
            font-weight: bold;
            text-align: center;
        }

        .levels-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .level-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.2em;
            position: relative;
            background-color: #fff;
            color: var(--text-main);
            box-shadow: 0 4px 0 var(--border-color);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 8px 0 #cbd5e1;
        }

        .level-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #cbd5e1;
        }

        .level-btn.unlocked {
            background: #ffffff;
            border-color: #6366f1;
            color: #6366f1;
            box-shadow: 0 4px 0 #4f46e5;
        }

        .level-btn.unlocked:hover {
            background: #e0e7ff;
            box-shadow: 0 8px 0 #4f46e5;
        }

        .level-btn.completed {
            background: #f0fdf4;
            border-color: #22c55e;
            color: #166534;
            box-shadow: 0 4px 0 #16a34a;
        }

        .level-btn.locked {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .star-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 0.85em;
            background: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .stats-section {
            background-color: #fff;
            border: 3px solid #e2e8f0;
            padding: 24px;
            border-radius: 28px;
            margin-top: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.03);
        }

        .stats-section h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.6em;
            color: #1e293b;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: scale(1.04) rotate(1deg);
        }

        .stat-value {
            font-size: 2.6em;
            font-weight: 800;
            color: #ff6b6b;
            line-height: 1.1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 1em;
            font-weight: bold;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .levels-container {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <div class="user-info">
            <p class="user-name">✨ Welcome back, <span id="userName"></span>! ✨</p>
            <p class="user-grade" id="userGradeDisplay">🐣 Kindergarten Hub</p>
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out 🚪</button>
    </div>

    <div id="subjectGrid" class="subject-grid"></div>

    <div class="stats-section">
        <h2>🏆 Your Super Star Badges</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="completedLevels">0</div>
                <div class="stat-label">🌟 Levels Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="averageScore">0%</div>
                <div class="stat-label">🎯 High Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAttempts">0</div>
                <div class="stat-label">🚀 Total Tries</div>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/userManager.js"></script>
<script>
    function checkLogin() {
        const currentUser = userManager.getCurrentUser();
        if (!currentUser) {
            window.location.href = 'login.html';
            return null;
        }
        return currentUser;
    }

    function loadDashboard() {
        const currentUser = checkLogin();
        if (!currentUser) return;

        document.getElementById('userName').textContent = currentUser.name;
        
        // Dynamic decorative labeling for target grades
        if (currentUser.gradeLevel === 'K') {
            document.getElementById('userGradeDisplay').textContent = "🐣 Kindergarten Practice Hub";
        } else {
            document.getElementById('userGradeDisplay').textContent = "🎯 Grade " + currentUser.gradeLevel + " Hub";
        }

        loadSubjects(currentUser);
        updateStats(currentUser);
    }

    function loadSubjects(currentUser) {
        const subjects = [
            { name: 'Math', emoji: '🔢', cardClass: 'math-card', fillClass: 'math-fill' },
            { name: 'English', emoji: '🔤', cardClass: 'english-card', fillClass: 'english-fill' },
            { name: 'Social Studies', emoji: '🗺️', cardClass: 'social-card', fillClass: 'social-fill' },
            { name: 'Science', emoji: '🧪', cardClass: 'science-card', fillClass: 'science-fill' }
        ];

        const progress = userManager.getUserProgress(currentUser.id);
        const grid = document.getElementById('subjectGrid');
        grid.innerHTML = '';

        const subjectKeyMap = {
            'Math': 'math',
            'English': 'english',
            'Social Studies': 'social',
            'Science': 'science'
        };

        subjects.forEach(subject => {
            const subjectKey = subjectKeyMap[subject.name];
            const subjectProgress = progress.grades[currentUser.gradeLevel]?.[subjectKey];

            if (!subjectProgress) return;

            const completedLevels = subjectProgress.levels.filter(l => l.completed).length;
            const totalSubjectLevels = subjectProgress.levels.length;
            const progressPercent = totalSubjectLevels > 0 ? (completedLevels / totalSubjectLevels) * 100 : 0;

            let html = `
                <div class="subject-card ${subject.cardClass}">
                    <h3>${subject.emoji} ${subject.name}</h3>
                    <div class="progress-container-box">
                        <div class="progress-bar">
                            <div class="progress-fill ${subject.fillClass}" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="progress-text">🎈 ${completedLevels} / ${totalSubjectLevels} Finished!</div>
                    </div>
                    <div class="levels-container">
            `;

            subjectProgress.levels.forEach(level => {
                const isLocked = level.locked;
                const isCompleted = level.completed;
                
                let btnClass = 'locked';
                let btnText = '🔒';
                let starBadge = '';

                if (!isLocked) {
                    if (isCompleted) {
                        btnClass = 'completed';
                        btnText = level.levelNum;
                        
                        // Fun reward metrics based safely on accuracy percentages
                        if (level.score >= 90) starBadge = `<span class="star-badge">🥇</span>`;
                        else if (level.score >= 70) starBadge = `<span class="star-badge">🥈</span>`;
                        else starBadge = `<span class="star-badge">🥉</span>`;
                    } else {
                        btnClass = 'unlocked';
                        btnText = level.levelNum;
                    }
                }

                const onclick = isLocked ? '' : `onclick="event.stopPropagation(); startQuiz('${subjectKey}', '${currentUser.gradeLevel}', ${level.levelNum})"`;

                html += `
                    <button class="level-btn ${btnClass}" ${onclick} ${isLocked ? 'disabled' : ''}>
                        ${starBadge}
                        <span>${btnText}</span>
                    </button>
                `;
            });

            html += `
                    </div>
                </div>
            `;
            grid.innerHTML += html;
        });
    }

    function startQuiz(subject, grade, level) {
        window.location.href = `${subject}/quiz.html?grade=${grade}&level=${level}`;
    }

    function updateStats(currentUser) {
        const progress = userManager.getUserProgress(currentUser.id);
        const subjects = ['math', 'english', 'social', 'science'];

        let totalCompleted = 0;
        let totalScore = 0;
        let scoreCount = 0;
        let totalAttempts = 0;

        subjects.forEach(subject => {
            const levels = progress.grades[currentUser.gradeLevel]?.[subject]?.levels || [];
            levels.forEach(level => {
                if (level.completed) {
                    totalCompleted++;
                    totalScore += level.score;
                    scoreCount++;
                }
                totalAttempts += level.attempts || 0;
            });
        });

        document.getElementById('completedLevels').textContent = totalCompleted;
        document.getElementById('averageScore').textContent = scoreCount > 0 ? Math.round(totalScore / scoreCount) + '%' : '0%';
        document.getElementById('totalAttempts').textContent = totalAttempts;
    }

    function logout() {
        if (confirm('Are you sure you want to exit your game hub?')) {
            sessionStorage.removeItem('pssaCurrentUser');
            window.location.href = 'login.html';
        }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
