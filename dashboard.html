<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning Hub - Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        :root{
            --primary:#6366f1;
            --secondary:#8b5cf6;
            --success:#10b981;
            --bg:#f8fafc;
            --card:#ffffff;
            --text:#0f172a;
            --muted:#64748b;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            padding:24px;
            font-family:Inter,Segoe UI,Arial,sans-serif;
            background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 100%);
            color:var(--text);
        }
        .container{max-width:1400px;margin:auto}
        .dashboard-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:28px;
            border-radius:24px;
            background:rgba(255,255,255,.9);
            backdrop-filter:blur(10px);
            box-shadow:0 12px 40px rgba(15,23,42,.08);
            margin-bottom:28px;
        }
        .user-name{font-size:2rem;font-weight:800;margin:0}
        .user-grade{
            display:inline-block;
            margin-top:10px;
            padding:8px 16px;
            border-radius:999px;
            background:#e0e7ff;
            color:#4338ca;
            font-weight:700;
        }
        .logout-btn{
            border:none;
            background:linear-gradient(135deg,#ef4444,#f97316);
            color:#fff;
            padding:12px 20px;
            border-radius:14px;
            cursor:pointer;
            font-weight:700;
        }
        .subject-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:24px;
        }
        .subject-card{
            background:var(--card);
            border-radius:24px;
            padding:24px;
            box-shadow:0 10px 30px rgba(15,23,42,.08);
            transition:.25s;
        }
        .subject-card:hover{transform:translateY(-6px)}
        .subject-card h3{margin-top:0}
        .progress-container-box{
            background:#f8fafc;
            padding:12px;
            border-radius:16px;
        }
        .progress-bar{
            height:14px;
            background:#e2e8f0;
            border-radius:999px;
            overflow:hidden;
        }
        .progress-fill{height:100%}
        .math-fill{background:linear-gradient(90deg,#3b82f6,#06b6d4)}
        .english-fill{background:linear-gradient(90deg,#ec4899,#f97316)}
        .social-fill{background:linear-gradient(90deg,#22c55e,#14b8a6)}
        .science-fill{background:linear-gradient(90deg,#8b5cf6,#ec4899)}
        .levels-container{
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:10px;
            margin-top:16px;
        }
        .level-btn{
            min-height:52px;
            border:none;
            border-radius:14px;
            font-weight:800;
        }
        .level-btn.unlocked{background:#e0e7ff;color:#4338ca}
        .level-btn.completed{background:#dcfce7;color:#166534}
        .level-btn.locked{background:#e2e8f0;color:#94a3b8}
        .stats-section{
            margin-top:28px;
            background:#fff;
            border-radius:24px;
            padding:24px;
            box-shadow:0 10px 30px rgba(15,23,42,.08);
        }
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }
        .stat-card{
            padding:24px;
            border-radius:20px;
            background:linear-gradient(135deg,#ffffff,#f8fafc);
            text-align:center;
            border:1px solid #e2e8f0;
        }
        .stat-value{
            font-size:2.5rem;
            font-weight:800;
            color:#4338ca;
        }
        @media(max-width:768px){
            .dashboard-header{flex-direction:column}
        }
    </style>

</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <div class="user-info">
            <p class="user-name">✨ Welcome back, <span id="userName"></span>! ✨</p>
            <p class="user-grade" id="userGradeDisplay">🐣 Kindergarten Hub</p>
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out 🚪</button>
    </div>

    <div id="subjectGrid" class="subject-grid"></div>

    <div class="stats-section">
        <h2>🏆 Your Super Star Badges</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="completedLevels">0</div>
                <div class="stat-label">🌟 Levels Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="averageScore">0%</div>
                <div class="stat-label">🎯 High Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAttempts">0</div>
                <div class="stat-label">🚀 Total Tries</div>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/userManager.js"></script>
<script>
    function checkLogin() {
        const currentUser = userManager.getCurrentUser();
        if (!currentUser) {
            window.location.href = 'login.html';
            return null;
        }
        return currentUser;
    }

    function loadDashboard() {
        const currentUser = checkLogin();
        if (!currentUser) return;

        // Upgrade old 10-level data to 25 levels, preserving progress
        try {
            const allProgress = localStorage.getItem('pssaProgress');
            if (allProgress) {
                const progressMap = JSON.parse(allProgress);
                const progress = progressMap[currentUser.id];

                let needsUpgrade = false;
                if (progress?.grades) {
                    const subjects = ['math', 'english', 'social', 'science'];
                    Object.keys(progress.grades).forEach(grade => {
                        subjects.forEach(subject => {
                            const levels = progress.grades[grade][subject]?.levels;
                            if (levels && levels.length === 10) {
                                // Add levels 11-25 to existing data
                                for (let i = 10; i < 25; i++) {
                                    levels.push({
                                        levelNum: i + 1,
                                        completed: false,
                                        score: 0,
                                        attempts: 0,
                                        timestamp: null,
                                        locked: true
                                    });
                                }
                                // Unlock level 11 if level 10 was completed
                                if (levels[9]?.completed) {
                                    levels[10].locked = false;
                                }
                                needsUpgrade = true;
                            }
                        });
                    });
                }

                // Save upgraded progress
                if (needsUpgrade) {
                    progressMap[currentUser.id] = progress;
                    localStorage.setItem('pssaProgress', JSON.stringify(progressMap));
                    // Reload to reflect changes
                    location.reload();
                    return;
                }
            }
        } catch (e) {
            console.error('Error upgrading progress:', e);
        }

        document.getElementById('userName').textContent = currentUser.name;

        // Dynamic decorative labeling for target grades
        if (currentUser.gradeLevel === 'K') {
            document.getElementById('userGradeDisplay').textContent = "🐣 Kindergarten Practice Hub";
        } else {
            document.getElementById('userGradeDisplay').textContent = "🎯 Grade " + currentUser.gradeLevel + " Hub";
        }

        loadSubjects(currentUser);
        updateStats(currentUser);
    }

    function loadSubjects(currentUser) {
        const subjects = [
            { name: 'Math', emoji: '🔢', cardClass: 'math-card', fillClass: 'math-fill' },
            { name: 'English', emoji: '🔤', cardClass: 'english-card', fillClass: 'english-fill' },
            { name: 'Social Studies', emoji: '🗺️', cardClass: 'social-card', fillClass: 'social-fill' },
            { name: 'Science', emoji: '🧪', cardClass: 'science-card', fillClass: 'science-fill' }
        ];

        const progress = userManager.getUserProgress(currentUser.id);
        const grid = document.getElementById('subjectGrid');
        grid.innerHTML = '';

        const subjectKeyMap = {
            'Math': 'math',
            'English': 'english',
            'Social Studies': 'social',
            'Science': 'science'
        };

        subjects.forEach(subject => {
            const subjectKey = subjectKeyMap[subject.name];
            const subjectProgress = progress.grades[currentUser.gradeLevel]?.[subjectKey];

            if (!subjectProgress) return;

            const completedLevels = subjectProgress.levels.filter(l => l.completed).length;
            const totalSubjectLevels = subjectProgress.levels.length;
            const progressPercent = totalSubjectLevels > 0 ? (completedLevels / totalSubjectLevels) * 100 : 0;

            let html = `
                <div class="subject-card ${subject.cardClass}">
                    <h3>${subject.emoji} ${subject.name}</h3>
                    <div class="progress-container-box">
                        <div class="progress-bar">
                            <div class="progress-fill ${subject.fillClass}" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="progress-text">🎈 ${completedLevels} / ${totalSubjectLevels} Finished!</div>
                    </div>
                    <div class="levels-container">
            `;

            subjectProgress.levels.forEach(level => {
                const isLocked = level.locked;
                const isCompleted = level.completed;

                let btnClass = 'locked';
                let btnText = '🔒';
                let starBadge = '';

                if (!isLocked) {
                    if (isCompleted) {
                        btnClass = 'completed';
                        btnText = level.levelNum;

                        // Fun reward metrics based safely on accuracy percentages
                        if (level.score >= 90) starBadge = `<span class="star-badge">🥇</span>`;
                        else if (level.score >= 70) starBadge = `<span class="star-badge">🥈</span>`;
                        else starBadge = `<span class="star-badge">🥉</span>`;
                    } else {
                        btnClass = 'unlocked';
                        btnText = level.levelNum;
                    }
                }

                const onclick = isLocked ? '' : `onclick="event.stopPropagation(); startQuiz('${subjectKey}', '${currentUser.gradeLevel}', ${level.levelNum})"`;

                html += `
                    <button class="level-btn ${btnClass}" ${onclick} ${isLocked ? 'disabled' : ''}>
                        ${starBadge}
                        <span>${btnText}</span>
                    </button>
                `;
            });

            html += `
                    </div>
                </div>
            `;
            grid.innerHTML += html;
        });
    }

    function startQuiz(subject, grade, level) {
        window.location.href = `${subject}/quiz.html?grade=${grade}&level=${level}`;
    }

    function updateStats(currentUser) {
        const progress = userManager.getUserProgress(currentUser.id);
        const subjects = ['math', 'english', 'social', 'science'];

        let totalCompleted = 0;
        let totalScore = 0;
        let scoreCount = 0;
        let totalAttempts = 0;

        subjects.forEach(subject => {
            const levels = progress.grades[currentUser.gradeLevel]?.[subject]?.levels || [];
            levels.forEach(level => {
                if (level.completed) {
                    totalCompleted++;
                    totalScore += level.score;
                    scoreCount++;
                }
                totalAttempts += level.attempts || 0;
            });
        });

        document.getElementById('completedLevels').textContent = totalCompleted;
        document.getElementById('averageScore').textContent = scoreCount > 0 ? Math.round(totalScore / scoreCount) + '%' : '0%';
        document.getElementById('totalAttempts').textContent = totalAttempts;
    }

    function logout() {
        if (confirm('Are you sure you want to exit your game hub?')) {
            sessionStorage.removeItem('pssaCurrentUser');
            window.location.href = 'login.html';
        }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
