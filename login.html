<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSSA Practice - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            --text-main: #2c3e50;
            --text-muted: #5a6c7d;
            --border-color: #e2e8f0;
            --radius: 8px;
            --transition: all 0.2s ease-in-out;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .login-container {
            max-width: 480px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
        }

        .header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-muted);
            margin: 0 0 6px 0;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #718096;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            box-sizing: border-box;
            font-family: inherit;
            background-color: #f1f5f9;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .form-buttons {
            margin-top: 25px;
        }

        .btn-login {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .continue-container {
            text-align: center;
            margin-top: 15px;
        }

        .btn-continue {
            background: none;
            border: none;
            color: #4a5568;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            padding: 8px;
            transition: var(--transition);
        }

        .btn-continue:hover {
            color: #27ae60;
        }

        .existing-users {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px dashed var(--border-color);
        }

        .existing-users h3 {
            font-size: 1rem;
            color: var(--text-main);
            margin: 0 0 15px 0;
        }

        .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        .user-btn {
            background-color: #f8fafc;
            color: var(--text-main);
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            text-align: center;
        }

        .user-btn small {
            display: block;
            margin-top: 4px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .user-btn:hover {
            background-color: #ffffff;
            border-color: #667eea;
            color: #667eea;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .status-message {
            font-weight: 500;
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error {
            color: #c53030;
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
        }

        .success {
            color: #22543d;
            background-color: #f0fff4;
            border: 1px solid #9ae6b4;
        }
    </style>
</head>
<body>
<main class="container login-container">
    <header class="header">
        <h1>🎓 PSSA Practice Hub</h1>
        <h2>Welcome to Your Learning Portal</h2>
        <p class="subtitle">Create a new account or select an existing user</p>
    </header>

    <div id="error" class="status-message error" style="display: none;" aria-live="assertive"></div>
    <div id="success" class="status-message success" style="display: none;" aria-live="polite"></div>

    <div id="loginForm">
        <div class="form-group">
            <label for="userName">Your Name:</label>
            <input type="text" id="userName" placeholder="Enter your name" required autocomplete="name">
        </div>

        <div class="form-group">
            <label for="gradeLevel">Select Your Grade:</label>
            <select id="gradeLevel" required>
                <option value="">-- Select a Grade --</option>
                <option value="K">Kindergarten</option>
                <option value="1">1st Grade</option>
                <option value="2">2nd Grade</option>
                <option value="3">3rd Grade</option>
                <option value="4">4th Grade</option>
                <option value="5">5th Grade</option>
            </select>
        </div>

        <div class="form-buttons">
            <button type="button" class="btn-login" onclick="createNewUser()">Create New User</button>
        </div>

        <div class="continue-container">
            <button type="button" class="btn-continue" onclick="goToDashboard()">
                Or continue with active session →
            </button>
        </div>
    </div>

    <section id="existingUsersSection" class="existing-users"></section>
</main>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/userManager.js"></script>
<script>
    // Load existing users on page load
    function loadExistingUsers() {
        const users = userManager.getAllUsers();
        const section = document.getElementById('existingUsersSection');

        if (!users || users.length === 0) {
            section.innerHTML = '';
            return;
        }

        let html = '<h3>Previous Users:</h3><div class="user-list">';

        users.forEach(user => {
            html += `
                    <button type="button" class="user-btn" onclick="selectExistingUser('${user.id}')">
                        ${user.name}
                        <small>Grade ${user.gradeLevel}</small>
                    </button>
                `;
        });

        html += '</div>';
        section.innerHTML = html;
    }

    // Create new user
    function createNewUser() {
        const nameInput = document.getElementById('userName');
        const gradeSelect = document.getElementById('gradeLevel');
        const name = nameInput.value.trim();
        const grade = gradeSelect.value;

        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!name) {
            errorDiv.textContent = '❌ Please enter your name';
            errorDiv.style.display = 'flex';
            nameInput.focus();
            return;
        }

        if (!grade) {
            errorDiv.textContent = '❌ Please select your grade';
            errorDiv.style.display = 'flex';
            gradeSelect.focus();
            return;
        }

        try {
            userManager.createUser(name, grade);
            successDiv.textContent = `✅ Welcome, ${name}! Starting your learning journey...`;
            successDiv.style.display = 'flex';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.style.display = 'flex';
        }
    }

    // Select existing user
    function selectExistingUser(userId) {
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        try {
            const user = userManager.setCurrentUser(userId);
            successDiv.textContent = `✅ Welcome back, ${user.name}!`;
            successDiv.style.display = 'flex';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.style.display = 'flex';
        }
    }

    // Go to dashboard (continue with existing user)
    function goToDashboard() {
        const currentUser = userManager.getCurrentUser();
        if (!currentUser) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ Please create a new user first or select an existing one';
            errorDiv.style.display = 'flex';
            return;
        }
        window.location.href = 'dashboard.html';
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
        if (userManager.getCurrentUser()) {
            window.location.href = 'dashboard.html';
            return;
        }
        loadExistingUsers();
    });
</script>
</body>
</html>
