<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>PSSA Practice - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --app-bg: #f4f6fa;
            --card-bg: #ffffff;
            --brand-primary: #667eea;
            --brand-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* MOBILE FIRST LAYOUT (Default behavior for phones) */
        .app-container {
            width: 100%;
            max-width: 100%;
            background: var(--card-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            box-shadow: none;
        }

        /* TABLET (TAB) LAYOUT */
        @media (min-width: 481px) and (max-width: 1024px) {
            body {
                padding: 40px 20px;
                background-color: var(--app-bg);
            }
            .app-container {
                max-width: 600px;
                min-height: auto;
                border-radius: 20px;
                padding: 40px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
                align-self: center;
            }
            .grade-grid {
                grid-template-columns: repeat(3, 1fr) !important;
            }
        }

        /* DESKTOP LAYOUT */
        @media (min-width: 1025px) {
            body {
                padding: 60px 20px;
                align-items: center;
            }
            .app-container {
                max-width: 460px;
                min-height: auto;
                border-radius: 24px;
                padding: 36px;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.03);
            }
        }

        /* Brand App Header */
        .app-header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 28px;
        }

        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .app-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 0 0 4px 0;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0;
        }

        /* Input Styling */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .mobile-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-family: inherit;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        .mobile-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        /* Responsive Grade Pill Grid */
        .grade-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        @media (max-width: 350px) {
            .grade-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .grade-card {
            background-color: #f8fafc;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 14px 8px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Fixed code editor warning: Added basic fallback selector format */
        .selected, .grade-card.selected {
            background-color: #e0e7ff;
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .grade-card:active {
            transform: scale(0.96);
        }

        /* Primary Action Buttons */
        .action-space {
            margin-top: auto;
            padding-top: 30px;
        }

        @media (min-width: 481px) {
            .action-space {
                margin-top: 24px;
            }
        }

        .btn-app-primary {
            width: 100%;
            background: var(--brand-gradient);
            color: white;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
        }

        .btn-app-primary:active {
            transform: scale(0.98);
            opacity: 0.95;
        }

        .btn-app-secondary {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            padding: 12px;
            margin-top: 8px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Native App Toast Messages */
        .app-toast {
            font-weight: 600;
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .error { color: #991b1b; background-color: #fef2f2; border: 1px solid #fca5a5; }
        .success { color: #065f46; background-color: #ecfdf5; border: 1px solid #6ee7b7; }

        /* Existing Profiles App Row */
        .existing-profiles {
            margin-top: 28px;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }

        .existing-profiles h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 0 0 12px 0;
        }

        .profile-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .profile-row::-webkit-scrollbar {
            display: none;
        }

        .profile-chip {
            scroll-snap-align: start;
            flex: 0 0 auto;
            min-width: 115px;
            background-color: #f1f5f9;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .profile-chip:active {
            transform: scale(0.95);
        }

        .profile-chip .name {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .profile-chip .grade {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
            display: block;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <h1>🎓 PSSA Practice Hub</h1>
        <h2>Learning Portal</h2>
        <p class="subtitle">Set up a profile or select an existing runner</p>
    </header>

    <div id="error" class="app-toast error" style="display: none;" aria-live="assertive"></div>
    <div id="success" class="app-toast success" style="display: none;" aria-live="polite"></div>

    <div id="loginForm">
        <div class="form-group">
            <label class="form-label" for="userName">Your Name</label>
            <input type="text" id="userName" class="mobile-input" placeholder="Enter name..." required autocomplete="name">
        </div>

        <div class="form-group">
            <span class="form-label">Select Your Grade</span>
            <select id="gradeLevel" style="display: none;" required>
                <option value="">-- Select a Grade --</option>
                <option value="K">K</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <div class="grade-grid">
                <div class="grade-card" data-val="K" onclick="selectGradeCard(this)">Kinder</div>
                <div class="grade-card" data-val="1" onclick="selectGradeCard(this)">1st</div>
                <div class="grade-card" data-val="2" onclick="selectGradeCard(this)">2nd</div>
                <div class="grade-card" data-val="3" onclick="selectGradeCard(this)">3rd</div>
                <div class="grade-card" data-val="4" onclick="selectGradeCard(this)">4th</div>
                <div class="grade-card" data-val="5" onclick="selectGradeCard(this)">5th</div>
            </div>
        </div>
    </div>

    <section id="existingUsersSection" class="existing-profiles"></section>

    <div class="action-space">
        <button type="button" class="btn-app-primary" onclick="createNewUser()">Create New Profile</button>
        <button type="button" class="btn-app-secondary" onclick="goToDashboard()">Or resume current session →</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/userManager.js"></script>
<script>
    // Custom component selection wrapper
    function selectGradeCard(element) {
        const containerGrid = element.parentElement;
        containerGrid.querySelectorAll('.grade-card').forEach(card => card.classList.remove('selected'));

        element.classList.add('selected');
        document.getElementById('gradeLevel').value = element.getAttribute('data-val');
    }

    // Load existing users into responsive carousel setup
    function loadExistingUsers() {
        const users = userManager.getAllUsers();
        const section = document.getElementById('existingUsersSection');

        if (!users || users.length === 0) {
            section.innerHTML = '';
            return;
        }

        let html = '<h3>Previous Profiles:</h3><div class="profile-row">';

        users.forEach(user => {
            html += `
                    <div class="profile-chip" onclick="selectExistingUser('${user.id}')">
                        <span class="name">${user.name}</span>
                        <span class="grade">Grade ${user.gradeLevel}</span>
                    </div>
                `;
        });

        html += '</div>';
        section.innerHTML = html;
    }

    // Create new user
    function createNewUser() {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        const grade = document.getElementById('gradeLevel').value;

        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!name) {
            errorDiv.textContent = '❌ Please enter your name';
            errorDiv.style.display = 'flex';
            nameInput.focus();
            return;
        }

        if (!grade) {
            errorDiv.textContent = '❌ Please tap to select your grade';
            errorDiv.style.display = 'flex';
            return;
        }

        try {
            userManager.createUser(name, grade);
            successDiv.textContent = `Welcome, ${name}! Launching portal...`;
            successDiv.style.display = 'flex';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.style.display = 'flex';
        }
    }

    // Select existing user
    function selectExistingUser(userId) {
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        try {
            const user = userManager.setCurrentUser(userId);
            successDiv.textContent = `Welcome back, ${user.name}!`;
            successDiv.style.display = 'flex';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.style.display = 'flex';
        }
    }

    // Go to dashboard (continue with existing user)
    function goToDashboard() {
        const currentUser = userManager.getCurrentUser();
        if (!currentUser) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ Create a new profile or choose an existing option first';
            errorDiv.style.display = 'flex';
            return;
        }
        window.location.href = 'dashboard.html';
    }

    // Initialize responsive viewport check
    document.addEventListener('DOMContentLoaded', function() {
        if (userManager.getCurrentUser()) {
            window.location.href = 'dashboard.html';
            return;
        }
        loadExistingUsers();
    });
</script>
</body>
</html>
